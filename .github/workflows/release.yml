name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build binary
        shell: pwsh
        run: go build -ldflags "-H=windowsgui" -o Centerist.exe .

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ steps.version.outputs.VERSION }}" `
            installer.iss

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} `
            "dist/Centerist-Setup.exe" `
            "Centerist.exe" `
            --title "Centerist ${{ github.ref_name }}" `
            --generate-notes
